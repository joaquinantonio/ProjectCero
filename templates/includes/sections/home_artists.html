<section class="cero-section">
  <div class="container">
    <div class="cero-section-header cero-section-header--split">
      <div>
        <p class="cero-kicker">Community</p>
        <h2>Artists connected to the space.</h2>
      </div>
      <a class="cero-text-link" href="{% url 'artists:artist_list' %}">View artists →</a>
    </div>

    <div class="cero-artist-rail">
      {% for artist in featured_artists %}
        {% include "includes/cards/home_artist_card.html" with artist=artist %}
      {% empty %}
        <article class="cero-card cero-empty-card">
          <p class="cero-card__label">No artists yet</p>
          <h3>Featured artists will appear here.</h3>
          <p>Mark artists as featured in admin to show them here.</p>
        </article>
      {% endfor %}
    </div>
  </div>
</section>
